services:
  db:
    image: postgres:16
    container_name: taller-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taller_db}
      POSTGRES_USER: ${POSTGRES_USER:-taller_user}
      # Sin valor por defecto: si POSTGRES_PASSWORD no está definida,
      # docker compose falla al arrancar con un error claro.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # El healthcheck verifica que PostgreSQL esté listo para aceptar
    # conexiones, no solo que el contenedor esté corriendo.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taller_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: taller-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    depends_on:
      db:
        # La API solo arranca cuando la DB supera el healthcheck.
        # Esto reemplaza el depends_on simple que solo esperaba
        # que el contenedor iniciara, no que Postgres estuviera listo.
        condition: service_healthy

volumes:
  postgres_data:

